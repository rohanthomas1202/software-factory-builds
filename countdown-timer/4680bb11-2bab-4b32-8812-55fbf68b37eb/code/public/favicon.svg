<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <title>Countdown Timer</title>

  <defs>
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </radialGradient>
    <radialGradient id="faceGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#3730a3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="16" cy="16" r="15.5" fill="url(#bgGrad)"/>

  <!-- Decorative outer ring -->
  <circle
    cx="16"
    cy="16"
    r="13.5"
    stroke="#6366f1"
    stroke-width="0.8"
    fill="none"
    opacity="0.45"
  />

  <!-- Progress arc — partial (decorative ~66%) -->
  <!-- circumference = 2π×11 ≈ 69.115; 66% ≈ 45.6 offset -->
  <circle
    cx="16"
    cy="16"
    r="11"
    stroke="#818cf8"
    stroke-width="1.8"
    fill="none"
    stroke-dasharray="69.115"
    stroke-dashoffset="23.5"
    stroke-linecap="round"
    transform="rotate(-90 16 16)"
    opacity="0.85"
  />

  <!-- Clock face -->
  <circle cx="16" cy="16" r="8" fill="url(#faceGrad)"/>

  <!-- Major tick marks -->
  <line x1="16" y1="9.5"  x2="16"  y2="11"   stroke="#a5b4fc" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="22.5" y1="16" x2="21"  y2="16"   stroke="#a5b4fc" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="22.5" x2="16"  y2="21"   stroke="#a5b4fc" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="9.5" y1="16"  x2="11"  y2="16"   stroke="#a5b4fc" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Minute hand (pointing ~12 o'clock) -->
  <line
    x1="16" y1="16"
    x2="16" y2="10.5"
    stroke="#c7d2fe"
    stroke-width="1.4"
    stroke-linecap="round"
  />

  <!-- Hour hand (pointing ~8 o'clock) -->
  <line
    x1="16" y1="16"
    x2="13" y2="18.5"
    stroke="#e0e7ff"
    stroke-width="1.8"
    stroke-linecap="round"
  />

  <!-- Center jewel -->
  <circle cx="16" cy="16" r="1.4" fill="#e0e7ff"/>
  <circle cx="16" cy="16" r="0.6" fill="#6366f1"/>

  <!-- Crown stem -->
  <rect x="14.6" y="3.2" width="2.8" height="2" rx="0.7" fill="#4f46e5"/>
  <rect x="15.2" y="2"   width="1.6" height="1.5" rx="0.5" fill="#818cf8"/>

  <!-- Lugs (side bumps of watch crown) -->
  <rect x="13.5" y="3.5" width="1" height="1.2" rx="0.4" fill="#4338ca"/>
  <rect x="17.5" y="3.5" width="1" height="1.2" rx="0.4" fill="#4338ca"/>
</svg>