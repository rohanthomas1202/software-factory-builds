<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <title>Timer Running</title>

  <!-- Deep green background circle -->
  <circle cx="16" cy="16" r="15.5" fill="#052e16"/>

  <!-- Grey track ring -->
  <circle
    cx="16"
    cy="16"
    r="12"
    stroke="#166534"
    stroke-width="2"
    fill="none"
    opacity="0.5"
  />

  <!-- Progress arc — green, ~75% complete (sweeping clockwise from top) -->
  <!-- circumference = 2π×12 ≈ 75.398; 75% ≈ 56.5 -->
  <circle
    cx="16"
    cy="16"
    r="12"
    stroke="#22c55e"
    stroke-width="2"
    fill="none"
    stroke-dasharray="75.398"
    stroke-dashoffset="18.85"
    stroke-linecap="round"
    transform="rotate(-90 16 16)"
  />

  <!-- Clock face background -->
  <circle cx="16" cy="16" r="8.5" fill="#14532d" opacity="0.55"/>

  <!-- Animated-look sweep second hand (pointing to ~2 o'clock position) -->
  <line
    x1="16" y1="16"
    x2="19.8" y2="10.5"
    stroke="#4ade80"
    stroke-width="1.3"
    stroke-linecap="round"
  />

  <!-- Hour hand (pointing roughly to 10) -->
  <line
    x1="16" y1="16"
    x2="12.8" y2="13.2"
    stroke="#86efac"
    stroke-width="1.8"
    stroke-linecap="round"
  />

  <!-- Tick marks -->
  <line x1="16" y1="9"    x2="16"   y2="10.2"  stroke="#4ade80" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="23" y1="16"   x2="21.8" y2="16"    stroke="#4ade80" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="23"   x2="16"   y2="21.8"  stroke="#4ade80" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="9"  y1="16"   x2="10.2" y2="16"    stroke="#4ade80" stroke-width="1" stroke-linecap="round" opacity="0.7"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.3" fill="#bbf7d0"/>

  <!-- Crown / stem -->
  <rect x="14.5" y="3.5" width="3" height="2" rx="0.8" fill="#16a34a" opacity="0.9"/>
  <rect x="15.2" y="2.2" width="1.6" height="1.8" rx="0.5" fill="#4ade80"/>
</svg>