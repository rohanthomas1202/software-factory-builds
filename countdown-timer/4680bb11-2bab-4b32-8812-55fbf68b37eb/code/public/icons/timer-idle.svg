<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <title>Timer Idle</title>

  <!-- Deep indigo background circle -->
  <circle cx="16" cy="16" r="15.5" fill="#1e1b4b"/>

  <!-- Subtle outer glow ring (track) -->
  <circle
    cx="16"
    cy="16"
    r="12"
    stroke="#4f46e5"
    stroke-width="1.5"
    fill="none"
    opacity="0.30"
  />

  <!-- Clock face -->
  <circle
    cx="16"
    cy="16"
    r="9"
    fill="#312e81"
    opacity="0.6"
  />

  <!-- Hour tick marks (12, 3, 6, 9 o'clock) -->
  <line x1="16" y1="8.5"  x2="16" y2="10"   stroke="#818cf8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="23.5" y1="16" x2="22"  y2="16"   stroke="#818cf8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="23.5" x2="16"  y2="22"   stroke="#818cf8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8.5" y1="16"  x2="10"  y2="16"   stroke="#818cf8" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Minute hand (pointing to 12 — idle/neutral) -->
  <line
    x1="16" y1="16"
    x2="16" y2="10"
    stroke="#a5b4fc"
    stroke-width="1.5"
    stroke-linecap="round"
  />

  <!-- Hour hand (pointing to ~10 o'clock) -->
  <line
    x1="16" y1="16"
    x2="12.5" y2="13"
    stroke="#c7d2fe"
    stroke-width="1.8"
    stroke-linecap="round"
  />

  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.2" fill="#e0e7ff"/>

  <!-- Crown / stem on top -->
  <rect x="14.5" y="3.5" width="3" height="2" rx="0.8" fill="#6366f1" opacity="0.9"/>
  <rect x="15.2" y="2.2" width="1.6" height="1.8" rx="0.5" fill="#818cf8"/>
</svg>