<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <title>Timer Complete</title>

  <!-- Warm dark amber background -->
  <circle cx="16" cy="16" r="15.5" fill="#1c1208"/>

  <!-- Full-circumference glow ring (complete!) -->
  <circle
    cx="16"
    cy="16"
    r="12"
    stroke="#f59e0b"
    stroke-width="2.2"
    fill="none"
    opacity="0.9"
  />

  <!-- Softer inner halo -->
  <circle
    cx="16"
    cy="16"
    r="12"
    stroke="#fcd34d"
    stroke-width="0.8"
    fill="none"
    opacity="0.4"
  />

  <!-- Amber clock face background -->
  <circle cx="16" cy="16" r="8.5" fill="#78350f" opacity="0.5"/>

  <!-- Checkmark / tick symbol — centered -->
  <!-- Left stroke of check -->
  <polyline
    points="11,16.5 14.5,20 21,12"
    stroke="#fbbf24"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Small sparkle dots around ring (celebration) -->
  <circle cx="16"   cy="4.5"  r="1"   fill="#fcd34d" opacity="0.85"/>
  <circle cx="27.5" cy="16"   r="0.9" fill="#fcd34d" opacity="0.75"/>
  <circle cx="4.5"  cy="16"   r="0.9" fill="#fcd34d" opacity="0.75"/>
  <circle cx="16"   cy="27.5" r="1"   fill="#fcd34d" opacity="0.85"/>
  <circle cx="24.2" cy="7.8"  r="0.7" fill="#f59e0b" opacity="0.65"/>
  <circle cx="7.8"  cy="7.8"  r="0.7" fill="#f59e0b" opacity="0.65"/>
  <circle cx="24.2" cy="24.2" r="0.7" fill="#f59e0b" opacity="0.65"/>
  <circle cx="7.8"  cy="24.2" r="0.7" fill="#f59e0b" opacity="0.65"/>

  <!-- Crown / stem — amber tone -->
  <rect x="14.5" y="3.5" width="3" height="1.8" rx="0.8" fill="#d97706" opacity="0.9"/>
  <rect x="15.2" y="2.2" width="1.6" height="1.6" rx="0.5" fill="#fbbf24"/>
</svg>